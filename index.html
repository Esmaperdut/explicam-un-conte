<!doctype html>
<html lang="ca">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#f5efe2" />
    <meta name="description" content="Endevina qui t'explica el conte." />
    <title>Sortit · Explica'm un conte</title>
    <link rel="stylesheet" href="styles.css?v=1.9.0&ui=readable" />
  </head>
  <body data-theme="home">
    <div class="scene-backdrop" aria-hidden="true">
      <span class="scene-orb scene-orb--one"></span>
      <span class="scene-orb scene-orb--two"></span>
      <span class="scene-line"></span>
    </div>

    <div class="app-shell">
      <header class="site-header">
        <button class="brand" id="home-button" type="button" aria-label="Torna a l'inici">
          <span class="brand-mark" aria-hidden="true">✦</span>
          <span class="brand-name">Sortit</span>
        </button>
        <div class="score-pill is-hidden" id="score-pill" aria-live="polite">
          <span>Punts</span>
          <strong id="score-value">0</strong>
        </div>
      </header>

      <main id="screen" tabindex="-1"></main>

      <footer class="site-footer">
        <span>Una història. Dotze veus. Qui és qui?</span>
        <span id="data-version">v1</span>
      </footer>
    </div>

    <div class="screen-flash" id="screen-flash" aria-hidden="true"></div>

    <script src="data.js?v=1.9.0&ui=readable"></script>
    <script src="game-engine.js?v=1.9.0&ui=readable"></script>
    <script src="app.js?v=1.9.0&ui=readable"></script>
  </body>
</html>
